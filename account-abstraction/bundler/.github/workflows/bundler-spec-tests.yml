name: Skandha ERC-4337 compliance (bundler-spec-tests)

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
      - develop

jobs:
  bundler-spec-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup PDM
        run: curl -sSL https://raw.githubusercontent.com/pdm-project/pdm/main/install-pdm.py | python3 -

      - name: Setup NodeJS
        uses: "actions/setup-node@v3"
        with:
          node-version: 18.20.6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.2.23

      - name: Checkout bundler spec tests
        uses: actions/checkout@v3
        with:
          repository: eth-infinitism/bundler-spec-tests
          # ref: f01eb0f44287b981a953a742a42bcd6a719c8812
          path: ./bundler-spec-tests
          submodules: true

      - name: Install Foundry
        run: |
          mkdir -p $HOME/.foundry/bin
          echo "$HOME/.foundry/bin" >> $GITHUB_PATH
          # Download and install foundry binaries directly
          curl -L https://github.com/foundry-rs/foundry/releases/download/v1.3.5/foundry_v1.3.5_linux_amd64.tar.gz | tar -xz -C $HOME/.foundry/bin
          chmod +x $HOME/.foundry/bin/forge $HOME/.foundry/bin/cast $HOME/.foundry/bin/anvil $HOME/.foundry/bin/chisel

      - name: Setup bundler spec tests
        working-directory: ./bundler-spec-tests
        run: |
          export PATH="$PATH:$HOME/.foundry/bin"
          pdm fix || true  # Fix deprecation warnings (ignore errors if already fixed)
          pdm install && \
          pdm run update-deps && \
          cd @account-abstraction && \
          git checkout develop && \
          yarn install --frozen-lockfile && \
          yarn compile && \
          cd ../spec && \
          yarn install --frozen-lockfile && \
          yarn build

      - name: Install Geth
        run: |
          sudo add-apt-repository -y ppa:ethereum/ethereum && \
          sudo apt-get update && \
          sudo apt-get install ethereum

      - name: Run Geth
        run: |
          geth \
          --verbosity 1 \
          --http.vhosts '*,localhost,host.docker.internal' \
          --http \
          --http.api eth,net,web3,debug \
          --http.corsdomain '*' \
          --http.addr "0.0.0.0" \
          --nodiscover --maxpeers 0 \
          --dev \
          --allow-insecure-unlock \
          --rpc.allow-unprotected-txs \
          --dev.gaslimit 20000000 &

      - name: Deploy ERC-4337 contracts
        working-directory: ./bundler-spec-tests
        # checkout to 0.6.0 commit https://github.com/eth-infinitism/account-abstraction/commits/abff2aca61a8f0934e533d0d352978055fddbd96
        # change this command when using new EP
        run: |
          export PATH="$PATH:$HOME/.foundry/bin"
          cd @account-abstraction && \
          git fetch --tags origin && \
          git checkout develop && \
          bun run deploy --network localhost

      - name: Fund bundler
        run: |
          geth \
          --exec "eth.sendTransaction({from: eth.accounts[0], to: \"0x55082761664aEb8062B3427ba5E0455bFb7b68CB\", value: web3.toWei(4337, \"ether\")})" \
          attach http://localhost:8545/

      - name: Install Skandha deps and build
        run: |
          bun install && \
          bun run build && \
          bun run bootstrap && \
          # Rebuild native modules for Linux platform
          cd node_modules/bcrypto && \
          npm run install

      - name: Start Skandha
        # This private key is for testing only
        run: |
          cp config.json.default config.json
          jq '.relayers = ["0x767b4393f6a5da742b30585428116f0395bee8e61c2da4ae8e67e5633389e2d3"]' config.json > config.json.tmp && mv config.json.tmp config.json
          ./skandha standalone --testingMode > skandha.log 2>&1 &
          SKANDHA_PID=$!
          echo $SKANDHA_PID > skandha.pid
          # Wait for bundler to be ready
          echo "Waiting for Skandha to start..."
          for i in {1..30}; do
            if curl -s http://127.0.0.1:14337/rpc/ -X POST -H "Content-Type: application/json" -d '{"jsonrpc":"2.0","method":"eth_chainId","params":[],"id":1}' > /dev/null 2>&1; then
              echo "Skandha is ready!"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Skandha failed to start after 30 seconds"
              cat skandha.log || true
              exit 1
            fi
            sleep 1
          done

      - name: Run tests
        working-directory: ./bundler-spec-tests
        # Change address to the latest EP 8
        run: |
          pdm fix || true  # Fix deprecation warnings before running tests
          pdm run test -rA -W ignore::DeprecationWarning --url http://127.0.0.1:14337/rpc/ --entry-point 0x433709009b8330fda32311df1c2afa402ed8d009 --ethereum-node http://localhost:8545 -k "not p2p"
        continue-on-error: true
      
      - name: Show Skandha logs on failure
        if: failure()
        run: |
          if [ -f skandha.log ]; then
            echo "=== Skandha logs ==="
            tail -100 skandha.log || true
          fi
          if [ -f skandha.pid ]; then
            PID=$(cat skandha.pid)
            if ps -p $PID > /dev/null 2>&1; then
              echo "Skandha process $PID is still running"
            else
              echo "Skandha process $PID is not running"
            fi
          fi
      
      - name: Send Slack notification
        uses: ravsamhq/notify-slack-action@2.3.0
        if: always()
        continue-on-error: true
        with:
          status: ${{ job.status }}
          notification_title: "{workflow} has {status_message}"
          message_format: "{emoji} *{workflow}* {status_message} in <{repo_url}|{repo}>"
          footer: "Repo <{repo_url}|{repo}> | <{run_url}|View Workflow>"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}